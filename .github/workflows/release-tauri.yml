# Build macOS app bundles and attach them to a GitHub Release when you push a version tag.
#
# Usage:
#   git tag v0.2.0
#   git push origin v0.2.0
#
# Match package.json / tauri version when tagging.
name: Release Tauri (macOS)

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Build app and upload to release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Loom ${{ github.ref_name }}"
          releaseBody: |
            macOS build from CI (Apple Silicon). Download the **.dmg** below.

            **First launch:** If macOS says the app can’t be opened, go to **System Settings → Privacy & Security** and choose **Open Anyway**, or right-click **Loom** → **Open**.

            For a fully trusted install, the maintainer can [codesign and notarize](https://tauri.app/distribute/sign-macos/) the app with an Apple Developer account.
          releaseDraft: false
          prerelease: false
